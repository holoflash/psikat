name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: psikat-linux-x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: psikat-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: psikat-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: psikat-windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libasound2-dev \
            libgl1-mesa-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev \
            libxkbcommon-dev \
            libwayland-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package macOS .app + .dmg
        if: startsWith(matrix.target, 'x86_64-apple') || startsWith(matrix.target, 'aarch64-apple')
        run: |
          APP_NAME="Psikat"
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          APP_DIR="${APP_NAME}.app"
          CONTENTS="${APP_DIR}/Contents"
          MACOS="${CONTENTS}/MacOS"
          RESOURCES="${CONTENTS}/Resources"

          mkdir -p "${MACOS}" "${RESOURCES}"
          cp "target/${{ matrix.target }}/release/psikat" "${MACOS}/${APP_NAME}"
          chmod +x "${MACOS}/${APP_NAME}"

          cat > "${CONTENTS}/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>${APP_NAME}</string>
              <key>CFBundleDisplayName</key>
              <string>${APP_NAME}</string>
              <key>CFBundleIdentifier</key>
              <string>com.holoflash.psikat</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundleExecutable</key>
              <string>${APP_NAME}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>LSMinimumSystemVersion</key>
              <string>12.0</string>
              <key>NSSupportsAutomaticGraphicsSwitching</key>
              <true/>
          </dict>
          </plist>
          PLIST

          ICONSET="AppIcon.iconset"
          mkdir -p "${ICONSET}"
          for SIZE in 16 32 64 128 256 512; do
            sips -z ${SIZE} ${SIZE} "assets/icon.png" --out "${ICONSET}/icon_${SIZE}x${SIZE}.png" > /dev/null 2>&1
          done
          for SIZE in 32 64 256 512 1024; do
            LABEL=$((SIZE / 2))
            sips -z ${SIZE} ${SIZE} "assets/icon.png" --out "${ICONSET}/icon_${LABEL}x${LABEL}@2x.png" > /dev/null 2>&1
          done
          iconutil -c icns "${ICONSET}" -o "${RESOURCES}/AppIcon.icns"
          rm -rf "${ICONSET}"

          DMG_NAME="${{ matrix.artifact }}.dmg"
          mkdir -p dmg_stage
          cp -r "${APP_DIR}" dmg_stage/
          ln -s /Applications dmg_stage/Applications
          hdiutil create -volname "${APP_NAME}" -srcfolder dmg_stage -ov -format UDZO "${DMG_NAME}"
          rm -rf dmg_stage "${APP_DIR}"

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          STAGE="${{ matrix.artifact }}"
          mkdir -p "${STAGE}"
          cp target/${{ matrix.target }}/release/psikat "${STAGE}/"
          chmod +x "${STAGE}/psikat"
          cp assets/psikat.desktop "${STAGE}/"
          cp assets/icon.png "${STAGE}/psikat.png"
          tar czf ${{ matrix.artifact }}.tar.gz "${STAGE}"
          rm -rf "${STAGE}"

      - name: Embed icon (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install rcedit -y
          rcedit "target/${{ matrix.target }}/release/psikat.exe" --set-icon "assets/psikat.ico"

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.artifact }}.zip psikat.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          generate_release_notes: true
          files: artifacts/*
